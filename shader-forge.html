<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>VISIO · Shader Forge — Visual Node Editor</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Bebas+Neue&family=Rajdhani:wght@600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#020205;--s1:#070718;--s2:#0a0a22;--bd:#141432;--c1:#00eaff;--c2:#ff006e;--c3:#7dff00;--c4:#ff9900;--c5:#b44dff;
  --fg:#c0c0e0;--fg2:#343460;--mono:'DM Mono',monospace;--disp:'Bebas Neue',sans-serif;--ui:'Rajdhani',sans-serif;
  --pt-float:#00eaff;--pt-vec2:#7dff00;--pt-vec3:#b44dff;--pt-sdf:#ff9900;--pt-col:#ff006e;}
*{margin:0;padding:0;box-sizing:border-box;}html,body{height:100%;overflow:hidden;}
body{background:var(--bg);color:var(--fg);font-family:var(--ui);display:flex;flex-direction:column;height:100vh;user-select:none;}

/* HEADER */
.hdr{display:flex;align-items:center;justify-content:space-between;padding:0 16px;height:44px;background:var(--s1);border-bottom:1px solid var(--bd);flex-shrink:0;}
.logo{font-family:var(--disp);font-size:20px;letter-spacing:6px;color:var(--c1);text-shadow:0 0 20px rgba(0,234,255,.4);}
.logo em{color:var(--c2);font-style:normal;}
.hdr-acts{display:flex;gap:4px;}
.hbtn{padding:4px 14px;border:1px solid var(--bd);background:transparent;color:var(--fg2);font:700 8px/1 var(--ui);letter-spacing:2px;cursor:pointer;transition:.15s;}
.hbtn:hover{border-color:var(--c1);color:var(--c1);}
.hbtn.p{background:var(--c1);color:#000;border-color:var(--c1);}.hbtn.p:hover{background:var(--c2);color:#fff;}
.hbtn.g{background:var(--c3);color:#000;border-color:var(--c3);}

/* LAYOUT */
.app{display:flex;flex:1;overflow:hidden;}

/* PALETTE */
.pal{width:190px;border-right:1px solid var(--bd);display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto;background:var(--s1);}
.pal-cat{padding:5px 10px;font-size:7px;font-weight:700;letter-spacing:2px;color:var(--fg2);border-bottom:1px solid var(--bd);background:rgba(255,255,255,.01);position:sticky;top:0;z-index:1;}
.pal-item{padding:5px 10px;border-bottom:1px solid rgba(20,20,50,.5);cursor:grab;transition:.1s;display:flex;align-items:center;gap:6px;}
.pal-item:hover{background:rgba(0,234,255,.06);padding-left:14px;}
.pal-item:active{cursor:grabbing;}
.pal-dot{width:8px;height:8px;border-radius:2px;flex-shrink:0;}
.pal-name{font-size:9px;font-weight:700;}.pal-desc{font-size:6px;color:var(--fg2);margin-top:1px;}

/* CANVAS AREA */
.cvs-wrap{flex:1;position:relative;overflow:hidden;background:var(--bg);cursor:grab;}
.cvs-wrap.panning{cursor:grabbing;}
.cvs-inner{position:absolute;top:0;left:0;width:8000px;height:6000px;transform-origin:0 0;}
.grid-bg{position:absolute;inset:0;background-image:radial-gradient(circle,rgba(20,20,50,.5) 1px,transparent 1px);background-size:20px 20px;pointer-events:none;}
.grid-bg2{position:absolute;inset:0;background-image:radial-gradient(circle,rgba(20,20,50,.3) 1px,transparent 1px);background-size:100px 100px;pointer-events:none;}

/* SVG WIRES */
.wires{position:absolute;inset:0;pointer-events:none;overflow:visible;}
.wire{fill:none;stroke-width:2.5;stroke-linecap:round;opacity:.7;}
.wire:hover{opacity:1;stroke-width:3.5;}
.wire-drag{fill:none;stroke-width:2;stroke-dasharray:6 4;opacity:.5;}

/* NODES */
.node{position:absolute;min-width:140px;background:var(--s2);border:1px solid var(--bd);border-radius:4px;cursor:grab;z-index:1;
  box-shadow:0 4px 20px rgba(0,0,0,.5);transition:box-shadow .15s;}
.node.sel{border-color:var(--c1);box-shadow:0 0 20px rgba(0,234,255,.2);}
.node:active{cursor:grabbing;z-index:100;}
.node-hdr{display:flex;align-items:center;gap:5px;padding:5px 8px;border-bottom:1px solid var(--bd);border-radius:4px 4px 0 0;}
.node-icon{width:14px;height:14px;border-radius:2px;display:flex;align-items:center;justify-content:center;font-size:8px;flex-shrink:0;}
.node-title{font-size:9px;font-weight:700;letter-spacing:1px;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.node-del{width:14px;height:14px;border:none;background:transparent;color:var(--fg2);font-size:10px;cursor:pointer;display:flex;align-items:center;justify-content:center;opacity:0;transition:.1s;}
.node:hover .node-del{opacity:1;}.node-del:hover{color:var(--c2);}
.node-body{padding:4px 0;}

/* PORTS */
.port-row{display:flex;align-items:center;padding:2px 0;position:relative;min-height:18px;}
.port-row.in{padding-left:14px;}.port-row.out{padding-right:14px;justify-content:flex-end;}
.port-dot{position:absolute;width:10px;height:10px;border-radius:50%;border:2px solid;cursor:crosshair;z-index:2;transition:.1s;}
.port-dot:hover{transform:scale(1.4);filter:brightness(1.3);}
.port-dot.in{left:-5px;}.port-dot.out{right:-5px;}
.port-lbl{font-size:7px;font-weight:700;letter-spacing:1px;color:var(--fg2);}
.port-lbl.out{text-align:right;}

/* PARAMS */
.node-param{display:flex;align-items:center;gap:4px;padding:2px 8px;}
.node-param label{font-size:7px;font-weight:700;color:var(--fg2);letter-spacing:1px;width:32px;flex-shrink:0;}
.node-param input[type=range]{flex:1;height:10px;accent-color:var(--c1);}
.node-param input[type=number]{width:42px;background:var(--bg);border:1px solid var(--bd);color:var(--fg);font:9px var(--mono);padding:1px 3px;text-align:right;}
.node-param input[type=color]{width:24px;height:16px;border:1px solid var(--bd);cursor:pointer;background:none;padding:0;}
.node-param .pval{font:8px var(--mono);color:var(--c1);width:28px;text-align:right;flex-shrink:0;}

/* RIGHT PANEL */
.rpanel{width:320px;border-left:1px solid var(--bd);display:flex;flex-direction:column;flex-shrink:0;}
.rpanel .shdr{display:flex;align-items:center;justify-content:space-between;padding:5px 10px;background:var(--s1);border-bottom:1px solid var(--bd);}
.rpanel .sttl{font-size:7px;font-weight:700;letter-spacing:2.5px;color:var(--fg2);}
.preview-cvs{width:100%;aspect-ratio:1;display:block;image-rendering:pixelated;border-bottom:1px solid var(--bd);}
.code-area{flex:1;overflow:auto;position:relative;}
.code-area pre{font:10px/1.5 var(--mono);color:#6888ff;padding:8px;white-space:pre-wrap;word-break:break-all;min-height:100%;}
.code-area .kw{color:var(--c2);}
.code-area .fn{color:var(--c1);}
.code-area .num{color:var(--c3);}
.code-area .cm{color:var(--fg2);}
.code-area .tp{color:var(--c5);}
.compile-bar{display:flex;align-items:center;gap:4px;padding:4px 8px;border-top:1px solid var(--bd);background:var(--s1);}
.compile-bar .status{font:8px var(--mono);flex:1;}
.compile-bar .status.ok{color:var(--c3);}.compile-bar .status.err{color:var(--c2);}
.copy-btn{padding:3px 10px;background:var(--c5);color:#fff;border:none;font:700 7px/1 var(--ui);letter-spacing:1.5px;cursor:pointer;}

/* ZOOM INDICATOR */
.zoom-ind{position:absolute;bottom:8px;left:8px;font:8px var(--mono);color:var(--fg2);pointer-events:none;z-index:5;}

/* TOAST */
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--c3);color:#000;font:700 9px/1 var(--ui);
  letter-spacing:2px;padding:8px 20px;z-index:9999;opacity:0;transition:opacity .3s;pointer-events:none;}
.toast.show{opacity:1;}

::-webkit-scrollbar{width:3px;}::-webkit-scrollbar-thumb{background:var(--bd);}
</style>
</head>
<body>
<div class="hdr">
  <div class="logo">VI<em>S</em>IO <span style="font-family:var(--ui);font-size:8px;letter-spacing:3px;color:var(--fg2);vertical-align:middle">SHADER FORGE</span></div>
  <div class="hdr-acts">
    <button class="hbtn" onclick="clearGraph()">LIMPIAR</button>
    <button class="hbtn" onclick="loadPreset('basic2d')">PRESET 2D</button>
    <button class="hbtn" onclick="loadPreset('raymarch')">PRESET 3D</button>
    <button class="hbtn p" onclick="compileGraph()">▶ COMPILAR</button>
    <button class="hbtn g" onclick="copyCode()">COPIAR GLSL</button>
  </div>
</div>
<div class="app">
  <div class="pal" id="palette"></div>
  <div class="cvs-wrap" id="cvsWrap">
    <div class="cvs-inner" id="cvsInner">
      <div class="grid-bg"></div>
      <div class="grid-bg2"></div>
      <svg class="wires" id="wiresSvg"></svg>
    </div>
    <div class="zoom-ind" id="zoomInd">100%</div>
  </div>
  <div class="rpanel">
    <div class="shdr"><span class="sttl">PREVIEW</span></div>
    <canvas class="preview-cvs" id="prevCvs" width="300" height="300"></canvas>
    <div class="shdr"><span class="sttl">GLSL GENERADO</span></div>
    <div class="code-area"><pre id="codeOut">// Añade nodos y conéctalos para generar código GLSL</pre></div>
    <div class="compile-bar">
      <span class="status ok" id="compStatus">Listo</span>
      <button class="copy-btn" onclick="copyCode()">COPIAR</button>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
'use strict';

// ═══════════════════════════════════════════════════
// PORT TYPES & COLORS
// ═══════════════════════════════════════════════════
const PT={float:'#00eaff',vec2:'#7dff00',vec3:'#b44dff',vec4:'#ff006e',sdf:'#ff9900'};
const COMPAT={
  'float→float':1,'float→vec2':1,'float→vec3':1,'float→vec4':1,'float→sdf':1,
  'vec2→vec2':1,'vec2→float':1,'vec3→vec3':1,'vec3→float':1,'vec3→vec2':1,
  'vec4→vec4':1,'vec4→vec3':1,'vec4→float':1,'sdf→sdf':1,'sdf→float':1,
};
function canConnect(from,to){return COMPAT[from+'→'+to]||false;}
function castExpr(expr,from,to){
  if(from===to)return expr;
  if(to==='float'){if(from==='vec2'||from==='vec3'||from==='vec4')return expr+'.x';if(from==='sdf')return expr;}
  if(to==='vec2'){if(from==='float')return`vec2(${expr})`;if(from==='vec3')return expr+'.xy';}
  if(to==='vec3'){if(from==='float')return`vec3(${expr})`;if(from==='vec4')return expr+'.xyz';if(from==='vec2')return`vec3(${expr},0.)`;}
  if(to==='vec4'){if(from==='float')return`vec4(vec3(${expr}),1.)`;if(from==='vec3')return`vec4(${expr},1.)`;}
  if(to==='sdf'&&from==='float')return expr;
  return expr;
}

// ═══════════════════════════════════════════════════
// NODE DEFINITIONS
// ═══════════════════════════════════════════════════
const NDEFS={
// ─── INPUTS ───
in_uv:{name:'UV Coords',cat:'input',color:'#0088aa',icon:'◎',
  inputs:[],outputs:[{n:'uv',t:'vec2'}],params:[],
  code:(p,ins)=>({uv:'((gl_FragCoord.xy-u_resolution*.5)/u_resolution.y)'})},
in_uv_raw:{name:'UV 0→1',cat:'input',color:'#0088aa',icon:'◫',
  inputs:[],outputs:[{n:'uv',t:'vec2'}],params:[],
  code:()=>({uv:'(gl_FragCoord.xy/u_resolution)'})},
in_time:{name:'Time',cat:'input',color:'#0088aa',icon:'⏱',
  inputs:[],outputs:[{n:'t',t:'float'}],params:[{n:'speed',min:.01,max:5,val:1,step:.01}],
  code:(p)=>({t:`(u_time*${p.speed.toFixed(3)})`})},
in_bass:{name:'Audio Bass',cat:'input',color:'#ff0066',icon:'♫',
  inputs:[],outputs:[{n:'v',t:'float'}],params:[{n:'gain',min:.1,max:5,val:1,step:.1}],
  code:(p)=>({v:`(u_bass*${p.gain.toFixed(2)})`})},
in_mid:{name:'Audio Mid',cat:'input',color:'#ff0066',icon:'♫',
  inputs:[],outputs:[{n:'v',t:'float'}],params:[{n:'gain',min:.1,max:5,val:1,step:.1}],
  code:(p)=>({v:`(u_mid*${p.gain.toFixed(2)})`})},
in_high:{name:'Audio High',cat:'input',color:'#ff0066',icon:'♫',
  inputs:[],outputs:[{n:'v',t:'float'}],params:[{n:'gain',min:.1,max:5,val:1,step:.1}],
  code:(p)=>({v:`(u_high*${p.gain.toFixed(2)})`})},
in_beat:{name:'Audio Beat',cat:'input',color:'#ff0066',icon:'⬤',
  inputs:[],outputs:[{n:'v',t:'float'}],params:[],
  code:()=>({v:'u_beat'})},
in_energy:{name:'Audio Energy',cat:'input',color:'#ff0066',icon:'≋',
  inputs:[],outputs:[{n:'v',t:'float'}],params:[],
  code:()=>({v:'u_energy'})},
in_pos3d:{name:'3D Position',cat:'input',color:'#0088aa',icon:'⬡',
  inputs:[],outputs:[{n:'p',t:'vec3'}],params:[],
  code:()=>({p:'p'})}, // only valid inside scene()

// ─── GENERATORS ───
gen_sdf_sphere:{name:'SDF Esfera',cat:'gen',color:'#cc6600',icon:'●',
  inputs:[{n:'pos',t:'vec3'},{n:'r',t:'float'}],outputs:[{n:'d',t:'sdf'}],
  params:[{n:'radius',min:.01,max:5,val:.5,step:.01}],
  code:(p,i)=>({d:`(length(${i.pos||'p'})-${i.r||p.radius.toFixed(3)})`})},
gen_sdf_box:{name:'SDF Caja',cat:'gen',color:'#cc6600',icon:'■',
  inputs:[{n:'pos',t:'vec3'},{n:'size',t:'vec3'}],outputs:[{n:'d',t:'sdf'}],
  params:[{n:'sx',min:.01,max:3,val:.4,step:.01},{n:'sy',min:.01,max:3,val:.4,step:.01},{n:'sz',min:.01,max:3,val:.4,step:.01}],
  code:(p,i)=>{const sz=i.size||`vec3(${p.sx.toFixed(3)},${p.sy.toFixed(3)},${p.sz.toFixed(3)})`;
    return{d:`sdBox(${i.pos||'p'},${sz})`};}},
gen_sdf_torus:{name:'SDF Toro',cat:'gen',color:'#cc6600',icon:'◯',
  inputs:[{n:'pos',t:'vec3'}],outputs:[{n:'d',t:'sdf'}],
  params:[{n:'R',min:.1,max:3,val:.8,step:.01},{n:'r',min:.01,max:1,val:.2,step:.01}],
  code:(p,i)=>({d:`sdTorus(${i.pos||'p'},vec2(${p.R.toFixed(3)},${p.r.toFixed(3)}))`})},
gen_noise:{name:'FBM Noise',cat:'gen',color:'#3388cc',icon:'◌',
  inputs:[{n:'pos',t:'vec3'}],outputs:[{n:'v',t:'float'}],
  params:[{n:'scale',min:.1,max:10,val:1,step:.1},{n:'oct',min:1,max:8,val:5,step:1}],
  code:(p,i)=>({v:`fbm(${i.pos||'vec3(uv,0.)'} * ${p.scale.toFixed(2)})`})},
gen_palette:{name:'Color Palette',cat:'gen',color:'#cc33aa',icon:'◆',
  inputs:[{n:'t',t:'float'}],outputs:[{n:'col',t:'vec3'}],
  params:[],
  code:(p,i)=>({col:`pal(${i.t||'0.'},vec3(.5),vec3(.5),vec3(1.,.7,.4),vec3(0.,.15,.3))`})},
gen_color:{name:'Color Sólido',cat:'gen',color:'#cc33aa',icon:'◼',
  inputs:[],outputs:[{n:'col',t:'vec3'}],
  params:[{n:'color',type:'color',val:'#00eaff'}],
  code:(p)=>{const c=hexToVec3(p.color);return{col:`vec3(${c})`};}},
gen_value:{name:'Valor Float',cat:'gen',color:'#0088aa',icon:'#',
  inputs:[],outputs:[{n:'v',t:'float'}],
  params:[{n:'val',min:-10,max:10,val:1,step:.01}],
  code:(p)=>({v:p.val.toFixed(4)})},

// ─── DOMAIN ───
dom_repeat:{name:'Repetición',cat:'domain',color:'#228855',icon:'⊞',
  inputs:[{n:'pos',t:'vec3'}],outputs:[{n:'pos',t:'vec3'}],
  params:[{n:'period',min:.5,max:10,val:3,step:.1}],
  code:(p,i)=>{const pd=p.period.toFixed(3);return{pos:`(mod(${i.pos||'p'}+${pd}*.5,vec3(${pd}))-${pd}*.5)`};}},
dom_fold:{name:'Fold (Abs)',cat:'domain',color:'#228855',icon:'⊿',
  inputs:[{n:'pos',t:'vec3'}],outputs:[{n:'pos',t:'vec3'}],
  params:[{n:'offset',min:0,max:5,val:1,step:.05}],
  code:(p,i)=>({pos:`(abs(${i.pos||'p'})-${p.offset.toFixed(3)})`})},
dom_rotate:{name:'Rotación',cat:'domain',color:'#228855',icon:'↻',
  inputs:[{n:'pos',t:'vec3'},{n:'angle',t:'float'}],outputs:[{n:'pos',t:'vec3'}],
  params:[{n:'speed',min:0,max:5,val:.5,step:.01},{n:'axis',min:0,max:2,val:0,step:1}],
  code:(p,i)=>{const a=i.angle||`u_time*${p.speed.toFixed(3)}`;const ax=Math.round(p.axis);
    if(ax===0)return{pos:`vec3(${i.pos||'p'}.x,(rot2(${a})*${i.pos||'p'}.yz))`};
    if(ax===1)return{pos:`vec3((rot2(${a})*${i.pos||'p'}.xz).x,${i.pos||'p'}.y,(rot2(${a})*${i.pos||'p'}.xz).y)`};
    return{pos:`vec3((rot2(${a})*${i.pos||'p'}.xy),${i.pos||'p'}.z)`};}},
dom_warp:{name:'Space Warp',cat:'domain',color:'#228855',icon:'≈',
  inputs:[{n:'pos',t:'vec3'},{n:'amount',t:'float'}],outputs:[{n:'pos',t:'vec3'}],
  params:[{n:'strength',min:0,max:3,val:.5,step:.01}],
  code:(p,i)=>{const amt=i.amount||p.strength.toFixed(3);return{pos:`(${i.pos||'p'}+fbm(${i.pos||'p'})*${amt})`};}},
dom_scale:{name:'Escala',cat:'domain',color:'#228855',icon:'⤡',
  inputs:[{n:'pos',t:'vec3'},{n:'s',t:'float'}],outputs:[{n:'pos',t:'vec3'}],
  params:[{n:'scale',min:.1,max:10,val:1,step:.01}],
  code:(p,i)=>({pos:`(${i.pos||'p'}*${i.s||p.scale.toFixed(3)})`})},
dom_translate:{name:'Trasladar',cat:'domain',color:'#228855',icon:'→',
  inputs:[{n:'pos',t:'vec3'},{n:'offset',t:'vec3'}],outputs:[{n:'pos',t:'vec3'}],
  params:[{n:'x',min:-5,max:5,val:0,step:.05},{n:'y',min:-5,max:5,val:0,step:.05},{n:'z',min:-5,max:5,val:0,step:.05}],
  code:(p,i)=>{const o=i.offset||`vec3(${p.x.toFixed(3)},${p.y.toFixed(3)},${p.z.toFixed(3)})`;return{pos:`(${i.pos||'p'}-${o})`};}},

// ─── OPERATORS ───
op_union:{name:'Unión',cat:'op',color:'#885500',icon:'∪',
  inputs:[{n:'a',t:'sdf'},{n:'b',t:'sdf'}],outputs:[{n:'d',t:'sdf'}],params:[],
  code:(p,i)=>({d:`min(${i.a||'1e5'},${i.b||'1e5'})`})},
op_smooth:{name:'Smooth Union',cat:'op',color:'#885500',icon:'∪~',
  inputs:[{n:'a',t:'sdf'},{n:'b',t:'sdf'}],outputs:[{n:'d',t:'sdf'}],
  params:[{n:'k',min:.01,max:2,val:.3,step:.01}],
  code:(p,i)=>({d:`opSU(${i.a||'1e5'},${i.b||'1e5'},${p.k.toFixed(3)})`})},
op_intersect:{name:'Intersección',cat:'op',color:'#885500',icon:'∩',
  inputs:[{n:'a',t:'sdf'},{n:'b',t:'sdf'}],outputs:[{n:'d',t:'sdf'}],params:[],
  code:(p,i)=>({d:`max(${i.a||'1e5'},${i.b||'1e5'})`})},
op_subtract:{name:'Substracción',cat:'op',color:'#885500',icon:'−',
  inputs:[{n:'a',t:'sdf'},{n:'b',t:'sdf'}],outputs:[{n:'d',t:'sdf'}],params:[],
  code:(p,i)=>({d:`max(${i.a||'1e5'},-(${i.b||'1e5'}))`})},

// ─── MATH ───
math_add:{name:'Sumar',cat:'math',color:'#336699',icon:'+',
  inputs:[{n:'a',t:'float'},{n:'b',t:'float'}],outputs:[{n:'r',t:'float'}],params:[],
  code:(p,i)=>({r:`(${i.a||'0.'}+${i.b||'0.'})`})},
math_mul:{name:'Multiplicar',cat:'math',color:'#336699',icon:'×',
  inputs:[{n:'a',t:'float'},{n:'b',t:'float'}],outputs:[{n:'r',t:'float'}],params:[],
  code:(p,i)=>({r:`(${i.a||'1.'}*${i.b||'1.'})`})},
math_mix:{name:'Mix/Lerp',cat:'math',color:'#336699',icon:'⇔',
  inputs:[{n:'a',t:'vec3'},{n:'b',t:'vec3'},{n:'t',t:'float'}],outputs:[{n:'r',t:'vec3'}],
  params:[{n:'factor',min:0,max:1,val:.5,step:.01}],
  code:(p,i)=>({r:`mix(${i.a||'vec3(0.)'},${i.b||'vec3(1.)'},${i.t||p.factor.toFixed(3)})`})},
math_sin:{name:'Sin',cat:'math',color:'#336699',icon:'∿',
  inputs:[{n:'x',t:'float'}],outputs:[{n:'r',t:'float'}],
  params:[{n:'freq',min:.1,max:50,val:1,step:.1},{n:'amp',min:0,max:5,val:1,step:.01}],
  code:(p,i)=>({r:`(sin(${i.x||'0.'}*${p.freq.toFixed(2)})*${p.amp.toFixed(3)})`})},
math_length:{name:'Length',cat:'math',color:'#336699',icon:'|v|',
  inputs:[{n:'v',t:'vec3'}],outputs:[{n:'r',t:'float'}],params:[],
  code:(p,i)=>({r:`length(${i.v||'vec3(0.)'})`})},
math_remap:{name:'Remap',cat:'math',color:'#336699',icon:'↔',
  inputs:[{n:'x',t:'float'}],outputs:[{n:'r',t:'float'}],
  params:[{n:'lo',min:-5,max:5,val:0,step:.01},{n:'hi',min:-5,max:5,val:1,step:.01}],
  code:(p,i)=>({r:`(${i.x||'0.'}*${(p.hi-p.lo).toFixed(3)}+${p.lo.toFixed(3)})`})},
math_f2v3:{name:'Float→Vec3',cat:'math',color:'#336699',icon:'→V',
  inputs:[{n:'x',t:'float'},{n:'y',t:'float'},{n:'z',t:'float'}],outputs:[{n:'v',t:'vec3'}],params:[],
  code:(p,i)=>({v:`vec3(${i.x||'0.'},${i.y||'0.'},${i.z||'0.'})`})},

// ─── RENDER ───
rnd_raymarcher:{name:'RAYMARCHER',cat:'render',color:'#aa4400',icon:'◈',
  inputs:[{n:'scene',t:'sdf'}],outputs:[{n:'color',t:'vec3'}],
  params:[{n:'steps',min:16,max:128,val:64,step:1},{n:'fog',min:0,max:1,val:.5,step:.01}],
  code:(p,i)=>({color:'_rmColor',_isRM:true,_scene:i.scene||'sdSphere(p,.5)',_steps:Math.round(p.steps),_fog:p.fog.toFixed(3)})},
rnd_light:{name:'Lighting',cat:'render',color:'#aa4400',icon:'☀',
  inputs:[{n:'col',t:'vec3'}],outputs:[{n:'color',t:'vec3'}],
  params:[{n:'spec',min:0,max:2,val:.5,step:.01}],

rnd_fog:{name:'Fog',cat:'render',color:'#aa4400',icon:'≡',

  code:(p,i)=>({color:`mix(${i.col||'vec3(0.)'},vec3(${p.r.toFixed(3)},${p.g.toFixed(3)},${p.b.toFixed(3)}),1.-exp(-${i.dist||'0.'}*${p.density.toFixed(4)}))`})},

// ─── POST ───
post_bloom:{name:'Bloom',cat:'post',color:'#aa0066',icon:'✦',

function hexToVec3(hex){const r=parseInt(hex.slice(1,3),16)/255,g=parseInt(hex.slice(3,5),16)/255,b=parseInt(hex.slice(5,7),16)/255;
  return`${r.toFixed(3)},${g.toFixed(3)},${b.toFixed(3)}`;}

  {id:'input',name:'ENTRADAS',items:['in_uv','in_uv_raw','in_time','in_bass','in_mid','in_high','in_beat','in_energy','in_pos3d']},

  {id:'domain',name:'DOMINIO',items:['dom_repeat','dom_fold','dom_rotate','dom_warp','dom_scale','dom_translate']},
  {id:'op',name:'OPERADORES SDF',items:['op_union','op_smooth','op_intersect','op_subtract']},
  {id:'math',name:'MATEMÁTICAS',items:['math_add','math_mul','math_mix','math_sin','math_length','math_remap','math_f2v3']},

// ═══════════════════════════════════════════════════
// GRAPH STATE
// ═══════════════════════════════════════════════════
let nodes=[],conns=[],nextId=1,selNode=null;
let panX=0,panY=0,zoom=1,isPanning=false,panStart={x:0,y:0};
let dragNode=null,dragOff={x:0,y:0};
let connecting=null; // {nodeId,portIdx,isOutput,type}
let dragWire=null; // temp SVG path

// ═══════════════════════════════════════════════════
// BUILD PALETTE
// ═══════════════════════════════════════════════════
function buildPalette(){
  const el=document.getElementById('palette');el.innerHTML='';
  CATS.forEach(cat=>{
    const h=document.createElement('div');h.className='pal-cat';h.textContent=cat.name;el.appendChild(h);
    cat.items.forEach(key=>{const def=NDEFS[key];if(!def)return;
      const d=document.createElement('div');d.className='pal-item';d.dataset.type=key;
      d.innerHTML=`<div class="pal-dot" style="background:${def.color}"></div><div><div class="pal-name">${def.name}</div></div>`;
      d.addEventListener('click',()=>addNode(key,400+Math.random()*200-panX,200+Math.random()*150-panY));
      el.appendChild(d);});});}

// ═══════════════════════════════════════════════════
// NODE MANAGEMENT
// ═══════════════════════════════════════════════════
function addNode(type,x,y){
  const def=NDEFS[type];if(!def)return;
  const id=nextId++;const params={};
  def.params.forEach(p=>{params[p.n]=p.val;});
  const node={id,type,x,y,params};
  nodes.push(node);renderNode(node);compileGraph();return node;}

function removeNode(id){
  conns=conns.filter(c=>c.from!==id&&c.to!==id);
  nodes=nodes.filter(n=>n.id!==id);
  const el=document.getElementById('n'+id);if(el)el.remove();
  redrawWires();compileGraph();}

function renderNode(node){
  const def=NDEFS[node.type];if(!def)return;
  const el=document.createElement('div');el.className='node';el.id='n'+node.id;
  el.style.left=node.x+'px';el.style.top=node.y+'px';
  // Header
  let html=`<div class="node-hdr" style="background:${def.color}22"><div class="node-icon" style="background:${def.color};color:#000">${def.icon}</div>
    <span class="node-title" style="color:${def.color}">${def.name}</span>
    <button class="node-del" onclick="event.stopPropagation();removeNode(${node.id})">×</button></div><div class="node-body">`;
  // Input ports
  def.inputs.forEach((p,i)=>{
    html+=`<div class="port-row in"><div class="port-dot in" style="border-color:${PT[p.t]};background:${PT[p.t]}33" data-node="${node.id}" data-port="${i}" data-io="in" data-type="${p.t}"></div>
      <span class="port-lbl">${p.n}</span></div>`;});
  // Params
  def.params.forEach(p=>{
    if(p.type==='color'){
      html+=`<div class="node-param"><label>${p.n}</label><input type="color" value="${node.params[p.n]}" onchange="updParam(${node.id},'${p.n}',this.value)"></div>`;
    }else{
      html+=`<div class="node-param"><label>${p.n}</label><input type="range" min="${p.min}" max="${p.max}" step="${p.step}" value="${node.params[p.n]}"
        oninput="updParam(${node.id},'${p.n}',+this.value);this.nextElementSibling.textContent=parseFloat(this.value).toFixed(2)"><span class="pval">${parseFloat(node.params[p.n]).toFixed(2)}</span></div>`;}});
  // Output ports
  def.outputs.forEach((p,i)=>{
    html+=`<div class="port-row out"><span class="port-lbl out">${p.n}</span>
      <div class="port-dot out" style="border-color:${PT[p.t]};background:${PT[p.t]}33" data-node="${node.id}" data-port="${i}" data-io="out" data-type="${p.t}"></div></div>`;});
  html+=`</div>`;el.innerHTML=html;
  // Drag
  el.addEventListener('mousedown',e=>{if(e.target.classList.contains('port-dot')||e.target.tagName==='INPUT'||e.target.tagName==='BUTTON')return;
    e.stopPropagation();dragNode=node;dragOff={x:e.clientX-node.x*zoom-panX,y:e.clientY-node.y*zoom-panY};
    selNode=node.id;document.querySelectorAll('.node').forEach(n=>n.classList.toggle('sel',n.id==='n'+node.id));});
  // Port events
  el.querySelectorAll('.port-dot').forEach(pd=>{
    pd.addEventListener('mousedown',e=>{e.stopPropagation();
      const nid=+pd.dataset.node,pi=+pd.dataset.port,io=pd.dataset.io,tp=pd.dataset.type;
      if(io==='out'){connecting={nodeId:nid,portIdx:pi,isOutput:true,type:tp};startDragWire(e);}
      else{// Clicking input: if connected, disconnect; else start reverse connect
        const existing=conns.find(c=>c.to===nid&&c.toPort===pi);
        if(existing){conns=conns.filter(c=>c!==existing);redrawWires();compileGraph();
          connecting={nodeId:existing.from,portIdx:existing.fromPort,isOutput:true,type:existing.fromType};startDragWire(e);}
        else{connecting={nodeId:nid,portIdx:pi,isOutput:false,type:tp};startDragWire(e);}}});});
  document.getElementById('cvsInner').appendChild(el);}

function updParam(nid,name,val){const n=nodes.find(n=>n.id===nid);if(n)n.params[name]=val;compileGraph();}

// ═══════════════════════════════════════════════════
// CONNECTIONS & WIRES
// ═══════════════════════════════════════════════════
function getPortPos(nodeId,portIdx,isOutput){
  const el=document.getElementById('n'+nodeId);if(!el)return{x:0,y:0};
  const dots=el.querySelectorAll(`.port-dot.${isOutput?'out':'in'}`);
  const dot=dots[portIdx];if(!dot)return{x:el.offsetLeft,y:el.offsetTop};
  const r=dot.getBoundingClientRect(),pr=el.parentElement.getBoundingClientRect();
  return{x:(r.left+r.width/2-pr.left)/zoom,y:(r.top+r.height/2-pr.top)/zoom};}

function bezierPath(x1,y1,x2,y2){const dx=Math.abs(x2-x1)*.5,dy=0;return`M${x1},${y1} C${x1+dx},${y1+dy} ${x2-dx},${y2-dy} ${x2},${y2}`;}

function redrawWires(){
  const svg=document.getElementById('wiresSvg');
  svg.querySelectorAll('.wire:not(.wire-drag)').forEach(w=>w.remove());
  conns.forEach(c=>{
    const fp=getPortPos(c.from,c.fromPort,true),tp=getPortPos(c.to,c.toPort,false);
    const path=document.createElementNS('http://www.w3.org/2000/svg','path');
    path.setAttribute('class','wire');path.setAttribute('d',bezierPath(fp.x,fp.y,tp.x,tp.y));
    path.setAttribute('stroke',PT[c.fromType]||'#666');
    path.style.pointerEvents='stroke';
    path.addEventListener('dblclick',()=>{conns=conns.filter(cc=>cc!==c);redrawWires();compileGraph();});
    svg.appendChild(path);});}

function startDragWire(e){
  const svg=document.getElementById('wiresSvg');
  dragWire=document.createElementNS('http://www.w3.org/2000/svg','path');
  dragWire.setAttribute('class','wire wire-drag');
  dragWire.setAttribute('stroke',PT[connecting.type]||'#666');
  svg.appendChild(dragWire);}

function updateDragWire(e){
  if(!dragWire||!connecting)return;
  const wrap=document.getElementById('cvsInner'),wr=wrap.getBoundingClientRect();
  const mx=(e.clientX-wr.left)/zoom,my=(e.clientY-wr.top)/zoom;
  const pp=getPortPos(connecting.nodeId,connecting.portIdx,connecting.isOutput);
  if(connecting.isOutput)dragWire.setAttribute('d',bezierPath(pp.x,pp.y,mx,my));
  else dragWire.setAttribute('d',bezierPath(mx,my,pp.x,pp.y));}

function endConnect(e){
  if(dragWire){dragWire.remove();dragWire=null;}
  if(!connecting)return;
  // Find target port under mouse
  const target=document.elementFromPoint(e.clientX,e.clientY);
  if(target&&target.classList.contains('port-dot')){
    const tnid=+target.dataset.node,tpi=+target.dataset.port,tio=target.dataset.io,ttp=target.dataset.type;
    if(connecting.nodeId!==tnid){
      let from,fromPort,fromType,to,toPort,toType;
      if(connecting.isOutput&&tio==='in'){from=connecting.nodeId;fromPort=connecting.portIdx;fromType=connecting.type;to=tnid;toPort=tpi;toType=ttp;}
      else if(!connecting.isOutput&&tio==='out'){from=tnid;fromPort=tpi;fromType=ttp;to=connecting.nodeId;toPort=connecting.portIdx;toType=connecting.type;}
      if(from!==undefined&&canConnect(fromType,toType)){
        conns=conns.filter(c=>!(c.to===to&&c.toPort===toPort)); // remove existing conn to this input
        conns.push({from,fromPort,fromType,to,toPort,toType});redrawWires();compileGraph();}}}
  connecting=null;}

// ═══════════════════════════════════════════════════
// GLSL CODE GENERATION
// ═══════════════════════════════════════════════════
function compileGraph(){
  const outNode=nodes.find(n=>n.type==='out_color');
  if(!outNode){setCode('// Añade un nodo OUTPUT y conéctalo','');return;}
  // Topological sort from output backwards
  const visited=new Set(),order=[],errors=[];
  function visit(nid){
    if(visited.has(nid))return;visited.add(nid);
    const incoming=conns.filter(c=>c.to===nid);
    incoming.forEach(c=>visit(c.from));order.push(nid);}
  visit(outNode.id);
  // Check for raymarcher
  let hasRM=false,rmNode=null,rmScene='sdSphere(p,.5)';
  // Generate code for each node
  const varMap={};// nodeId → {portName → expression}
  let lines=[];
  order.forEach(nid=>{
    const node=nodes.find(n=>n.id===nid);if(!node)return;
    const def=NDEFS[node.type];if(!def)return;
    // Gather inputs from connections
    const inputExprs={};
    def.inputs.forEach((inp,i)=>{
      const conn=conns.find(c=>c.to===nid&&c.toPort===i);
      if(conn&&varMap[conn.from]){
        const srcDef=NDEFS[nodes.find(n=>n.id===conn.from)?.type];
        if(srcDef&&srcDef.outputs[conn.fromPort]){
          const srcPortName=srcDef.outputs[conn.fromPort].n;
          let expr=varMap[conn.from][srcPortName];
          if(expr)inputExprs[inp.n]=castExpr(expr,conn.fromType,conn.toType);}}});
    // Generate
    try{
      const result=def.code(node.params,inputExprs);
      // Check for raymarcher
      if(result._isRM){hasRM=true;rmNode=node;rmScene=result._scene;}
      varMap[nid]=result;
      // Generate variable assignments
      def.outputs.forEach(out=>{
        if(result[out.n]&&!result[out.n].startsWith('_')){
          const vn=`_n${nid}_${out.n}`;
          lines.push(`  ${out.t} ${vn} = ${result[out.n]};`);
          varMap[nid][out.n]=vn;}});
    }catch(e){errors.push(e.message);}});
  // Build final GLSL
  let glsl=`precision highp float;
uniform float u_time,u_bass,u_mid,u_high,u_beat,u_energy,u_onset,u_centroid,u_flux,u_intensity;
uniform vec2 u_resolution;
uniform sampler2D u_spectrum;
#define PI 3.14159265359
#define TAU 6.28318530718
vec3 pal(float t,vec3 a,vec3 b,vec3 c,vec3 d){return a+b*cos(TAU*(c*t+d));}
float h2(vec2 p){return fract(sin(dot(p,vec2(127.1,311.7)))*43758.5453);}
float h3(vec3 p){p=fract(p*vec3(443.9,397.3,491.2));p+=dot(p.zxy,p.yxz+19.19);return fract(p.x*p.y*p.z);}
float n3(vec3 p){vec3 i=floor(p),f=fract(p);f=f*f*(3.-2.*f);
  return mix(mix(mix(h3(i),h3(i+vec3(1,0,0)),f.x),mix(h3(i+vec3(0,1,0)),h3(i+vec3(1,1,0)),f.x),f.y),
             mix(mix(h3(i+vec3(0,0,1)),h3(i+vec3(1,0,1)),f.x),mix(h3(i+vec3(0,1,1)),h3(i+vec3(1,1,1)),f.x),f.y),f.z);}
float fbm(vec3 p){float v=0.,a=.5;for(int i=0;i<5;i++){v+=a*n3(p);p=p*2.+vec3(1.7,9.2,4.5);a*=.5;}return v;}
mat2 rot2(float a){float c=cos(a),s=sin(a);return mat2(c,-s,s,c);}
float sdSphere(vec3 p,float r){return length(p)-r;}
float sdBox(vec3 p,vec3 b){vec3 q=abs(p)-b;return length(max(q,0.))+min(max(q.x,max(q.y,q.z)),0.);}
float sdTorus(vec3 p,vec2 t){return length(vec2(length(p.xz)-t.x,p.y))-t.y;}
float opSU(float a,float b,float k){float h=clamp(.5+.5*(b-a)/k,0.,1.);return mix(b,a,h)-k*h*(1.-h);}
vec3 ACESfilm(vec3 x){float a=2.51,b=.03,c=2.43,d=.59,e=.14;return clamp((x*(a*x+b))/(x*(c*x+d)+e),0.,1.);}\n`;

  if(hasRM){
    // 3D RAYMARCHING MODE
    glsl+=`\nfloat scene(vec3 p){\n  return ${rmScene};\n}\n`;
    glsl+=`vec3 calcN(vec3 p){vec2 e=vec2(.001,0);return normalize(vec3(scene(p+e.xyy)-scene(p-e.xyy),scene(p+e.yxy)-scene(p-e.yxy),scene(p+e.yyx)-scene(p-e.yyx)));}\n`;
    glsl+=`\nvoid main(){\n  vec2 uv=(gl_FragCoord.xy-u_resolution*.5)/u_resolution.y;\n`;
    glsl+=`  vec3 ro=vec3(sin(u_time*.3)*3.,2.+u_bass,cos(u_time*.3)*3.);\n`;
    glsl+=`  vec3 fwd=normalize(-ro),rt=normalize(cross(fwd,vec3(0,1,0))),up=cross(rt,fwd);\n`;
    glsl+=`  vec3 rd=normalize(uv.x*rt+uv.y*up+1.5*fwd);\n`;
    glsl+=`  float t=0.;int si=0;\n`;
    glsl+=`  for(int i=0;i<${rmNode?Math.round(rmNode.params.steps):64};i++){float d=scene(ro+rd*t);if(d<.002){si=i;break;}t+=d;if(t>30.)break;si=i;}\n`;
    glsl+=`  vec3 p=ro+rd*t,n=calcN(p);\n`;
    glsl+=`  vec3 ld=normalize(vec3(1,2,-1));float _diff=max(dot(n,ld),0.)*.7+.3;\n`;
    glsl+=`  float _spec=pow(max(dot(reflect(-ld,n),-rd),0.),32.);\n`;
    glsl+=`  float _fres=pow(1.-abs(dot(n,-rd)),3.);\n`;
    glsl+=`  float _ao=1.-float(si)/${rmNode?Math.round(rmNode.params.steps):64}.*.5;\n`;
    // Remaining nodes code
    lines.forEach(l=>{if(!l.includes('scene'))glsl+=l+'\n';});
    const finalExpr=varMap[outNode.id]?._final||'vec3(_diff*_ao)';
    glsl+=`  vec3 _fog=mix(vec3(.01,.02,.06),vec3(.01),1.-exp(-t*${rmNode?.params.fog||'.05'}));\n`;
    glsl+=`  vec3 finalCol=mix(${finalExpr},_fog,clamp(t/25.,0.,1.))*u_intensity;\n`;
    glsl+=`  gl_FragColor=vec4(finalCol,1.);\n}\n`;
  }else{
    // 2D MODE
    glsl+=`\nvoid main(){\n`;
    lines.forEach(l=>glsl+=l+'\n');
    const finalExpr=varMap[outNode.id]?._final||'vec3(0.)';
    glsl+=`  gl_FragColor=vec4(${finalExpr}*u_intensity,1.);\n}\n`;
  }
  setCode(glsl,errors.join('; '));compilePreview(glsl);}

let genCode='';
function setCode(glsl,err){
  genCode=glsl;
  const el=document.getElementById('codeOut');
  // Simple syntax highlighting
  let h=glsl.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  h=h.replace(/\b(void|float|vec[234]|mat[234]|int|bool|sampler2D|return|if|for|break|precision|highp|uniform|in|out)\b/g,'<span class="kw">$1</span>');
  h=h.replace(/\b(sin|cos|pow|abs|min|max|mix|clamp|dot|cross|normalize|length|fract|floor|step|smoothstep|exp|log|sqrt|mod|atan|reflect|texture)\b/g,'<span class="fn">$1</span>');
  h=h.replace(/\b(\d+\.?\d*[eE]?[+-]?\d*)\b/g,'<span class="num">$1</span>');
  h=h.replace(/(\/\/.*)/g,'<span class="cm">$1</span>');
  el.innerHTML=h;
  const st=document.getElementById('compStatus');
  if(err){st.className='status err';st.textContent='✗ '+err;}else{st.className='status ok';st.textContent='✓ Compilado';}}

// ═══════════════════════════════════════════════════
// WebGL PREVIEW
// ═══════════════════════════════════════════════════
let glCtx=null,glProg=null,glBuf=null,glT0=Date.now();
function initGL(){
  const cvs=document.getElementById('prevCvs');
  glCtx=cvs.getContext('webgl',{antialias:false});if(!glCtx)return;
  glBuf=glCtx.createBuffer();glCtx.bindBuffer(glCtx.ARRAY_BUFFER,glBuf);
  glCtx.bufferData(glCtx.ARRAY_BUFFER,new Float32Array([-1,-1,1,-1,-1,1,1,1]),glCtx.STATIC_DRAW);}

function compilePreview(frag){
  const gl=glCtx;if(!gl)return;
  const vs=gl.createShader(gl.VERTEX_SHADER);gl.shaderSource(vs,'attribute vec2 p;void main(){gl_Position=vec4(p,0.,1.);}');gl.compileShader(vs);
  const fs=gl.createShader(gl.FRAGMENT_SHADER);gl.shaderSource(fs,frag);gl.compileShader(fs);
  if(!gl.getShaderParameter(fs,gl.COMPILE_STATUS)){
    document.getElementById('compStatus').className='status err';
    document.getElementById('compStatus').textContent='✗ '+gl.getShaderInfoLog(fs).split('\n')[0];return;}
  const p=gl.createProgram();gl.attachShader(p,vs);gl.attachShader(p,fs);gl.linkProgram(p);
  if(!gl.getProgramParameter(p,gl.LINK_STATUS))return;
  if(glProg)gl.deleteProgram(glProg);glProg=p;}

function renderPreview(){
  const gl=glCtx;if(!gl||!glProg)return;
  const w=gl.canvas.width=gl.canvas.clientWidth,h=gl.canvas.height=gl.canvas.clientHeight;
  gl.viewport(0,0,w,h);gl.useProgram(glProg);
  const t=(Date.now()-glT0)/1000;
  const loc=n=>gl.getUniformLocation(glProg,n);
  gl.uniform1f(loc('u_time'),t);gl.uniform2f(loc('u_resolution'),w,h);
  // Simulated audio
  const bp=(t*128/60)%1,kick=Math.exp(-bp*8)*1.5;
  gl.uniform1f(loc('u_bass'),Math.max(0,Math.min(1,kick*.5+.2)));
  gl.uniform1f(loc('u_mid'),.2+Math.sin(t*.9)*.1);
  gl.uniform1f(loc('u_high'),.1+Math.sin(t*2.3)*.08);
  gl.uniform1f(loc('u_beat'),Math.exp(-bp*6)*.8);
  gl.uniform1f(loc('u_energy'),.25);gl.uniform1f(loc('u_onset'),Math.exp(-bp*10)*.5);
  gl.uniform1f(loc('u_centroid'),.3);gl.uniform1f(loc('u_flux'),Math.exp(-bp*8)*.3);
  gl.uniform1f(loc('u_intensity'),1);
  const pl=gl.getAttribLocation(glProg,'p');
  gl.bindBuffer(gl.ARRAY_BUFFER,glBuf);gl.enableVertexAttribArray(pl);gl.vertexAttribPointer(pl,2,gl.FLOAT,false,0,0);
  gl.drawArrays(gl.TRIANGLE_STRIP,0,4);}

// ═══════════════════════════════════════════════════
// PAN & ZOOM
// ═══════════════════════════════════════════════════
function updateTransform(){
  const inner=document.getElementById('cvsInner');
  inner.style.transform=`translate(${panX}px,${panY}px) scale(${zoom})`;
  document.getElementById('zoomInd').textContent=Math.round(zoom*100)+'%';}

const wrap=document.getElementById('cvsWrap');
wrap.addEventListener('mousedown',e=>{if(e.target===wrap||e.target.classList.contains('grid-bg')||e.target.classList.contains('grid-bg2')){
  isPanning=true;panStart={x:e.clientX-panX,y:e.clientY-panY};wrap.classList.add('panning');
  selNode=null;document.querySelectorAll('.node').forEach(n=>n.classList.remove('sel'));}});
wrap.addEventListener('wheel',e=>{e.preventDefault();const dz=e.deltaY>0?.9:1.1;
  zoom=Math.max(.2,Math.min(3,zoom*dz));updateTransform();},{passive:false});

document.addEventListener('mousemove',e=>{
  if(isPanning){panX=e.clientX-panStart.x;panY=e.clientY-panStart.y;updateTransform();}
  if(dragNode){dragNode.x=(e.clientX-dragOff.x-panX)/zoom;dragNode.y=(e.clientY-dragOff.y-panY)/zoom;
    const el=document.getElementById('n'+dragNode.id);if(el){el.style.left=dragNode.x+'px';el.style.top=dragNode.y+'px';}redrawWires();}
  if(connecting)updateDragWire(e);});

document.addEventListener('mouseup',e=>{
  if(isPanning){isPanning=false;wrap.classList.remove('panning');}
  if(dragNode){dragNode=null;}
  if(connecting)endConnect(e);});

// ═══════════════════════════════════════════════════
// PRESETS
// ═══════════════════════════════════════════════════
function clearGraph(){nodes=[];conns=[];
  document.getElementById('cvsInner').querySelectorAll('.node').forEach(n=>n.remove());redrawWires();
  setCode('// Grafo vacío — añade nodos desde la paleta','');}

function loadPreset(name){
  clearGraph();
  if(name==='basic2d'){
    addNode('in_uv',100,100);addNode('in_time',100,220);addNode('math_sin',330,160);
    addNode('gen_palette',550,120);addNode('post_aces',750,140);addNode('out_color',950,160);
    // Auto-connect after render
    setTimeout(()=>{
      const ids=nodes.map(n=>n.id);
      // UV → sin.x
      conns.push({from:ids[0],fromPort:0,fromType:'vec2',to:ids[2],toPort:0,toType:'float'});
      // time → sin (as freq mod, via add)
      // sin → palette.t
      conns.push({from:ids[2],fromPort:0,fromType:'float',to:ids[3],toPort:0,toType:'float'});
      // palette → aces
      conns.push({from:ids[3],fromPort:0,fromType:'vec3',to:ids[4],toPort:0,toType:'vec3'});
      // aces → output
      conns.push({from:ids[4],fromPort:0,fromType:'vec3',to:ids[5],toPort:0,toType:'vec3'});
      redrawWires();compileGraph();},100);
  }else if(name==='raymarch'){
    addNode('in_pos3d',80,60);addNode('gen_sdf_sphere',300,40);addNode('gen_sdf_box',300,180);
    addNode('op_smooth',520,100);addNode('rnd_raymarcher',720,100);
    addNode('rnd_light',720,280);addNode('gen_palette',520,300);
    addNode('post_aces',920,200);addNode('out_color',1100,200);
    setTimeout(()=>{
      const ids=nodes.map(n=>n.id);
      conns.push({from:ids[0],fromPort:0,fromType:'vec3',to:ids[1],toPort:0,toType:'vec3'});
      conns.push({from:ids[0],fromPort:0,fromType:'vec3',to:ids[2],toPort:0,toType:'vec3'});
      conns.push({from:ids[1],fromPort:0,fromType:'sdf',to:ids[3],toPort:0,toType:'sdf'});
      conns.push({from:ids[2],fromPort:0,fromType:'sdf',to:ids[3],toPort:1,toType:'sdf'});
      conns.push({from:ids[3],fromPort:0,fromType:'sdf',to:ids[4],toPort:0,toType:'sdf'});
      conns.push({from:ids[6],fromPort:0,fromType:'vec3',to:ids[5],toPort:0,toType:'vec3'});
      conns.push({from:ids[5],fromPort:0,fromType:'vec3',to:ids[7],toPort:0,toType:'vec3'});
      conns.push({from:ids[7],fromPort:0,fromType:'vec3',to:ids[8],toPort:0,toType:'vec3'});
      redrawWires();compileGraph();},100);
  }
}

function copyCode(){
  navigator.clipboard.writeText(genCode).then(()=>showToast('GLSL copiado al portapapeles'));
}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2000);}

// ═══════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════
buildPalette();initGL();updateTransform();
loadPreset('basic2d');
// Render loop
(function frame(){renderPreview();requestAnimationFrame(frame);})();
</script>
